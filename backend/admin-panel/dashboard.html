<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Tableau de bord — Soumissions</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="topbar">
  <div class="container">
    <div>
      <h1><i class="fa-solid fa-gauge"></i> Soumissions — Soirée Gala INSPEI</h1>
      <div class="sub">Tableau de bord administrateur</div>
    </div>
    <button class="logout-btn" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
  </div>
</div>

<div class="container" style="padding-top:24px;padding-bottom:60px;">
  <div class="stats" id="stats">
    <div class="stat"><b id="statTotal">--</b><span>Projets soumis</span></div>
    <div class="stat"><b id="statLink">--</b><span>Avec lien</span></div>
    <div class="stat"><b id="statFile">--</b><span>Avec fichier</span></div>
    <div class="stat"><b id="statSelected">--</b><span>Sélectionnés</span></div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Rechercher (titre, nom, email)…" style="flex:1;min-width:220px;">
    <select id="statusFilter">
      <option value="">Tous les statuts</option>
      <option value="submitted">Soumis</option>
      <option value="reviewed">Examiné</option>
      <option value="selected">Sélectionné</option>
    </select>
  </div>

  <div id="tableWrap">
    <div class="loading">Chargement des soumissions…</div>
  </div>
</div>

<script src="js/admin-config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
