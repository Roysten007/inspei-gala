<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Soirée Gala INSPEI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-atmosphere"></div>
<div class="bg-circuits"></div>
<div class="bg-stars"></div>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;color:var(--gold);font-size:.85rem;margin-bottom:20px;"><i class="fa-solid fa-arrow-left"></i> Retour à l'accueil</a>
    <h1>Bon retour</h1>
    <p class="sub">Connectez-vous pour soumettre ou modifier votre projet.</p>

    <div id="alertBox"></div>

    <form id="loginForm" novalidate>
      <div class="field" id="f-email">
        <label for="email">Adresse email</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" name="email" placeholder="vous@exemple.com" autocomplete="email" required>
        </div>
        <div class="field-error">Veuillez entrer un email valide.</div>
      </div>

      <div class="field" id="f-password">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" name="password" placeholder="Votre mot de passe" autocomplete="current-password" required>
          <button type="button" class="toggle-pass" data-target="password"><i class="fa-solid fa-eye"></i></button>
        </div>
        <div class="field-error">Mot de passe requis.</div>
      </div>

      <button type="submit" class="btn btn-gold btn-block" id="submitBtn">
        <i class="fa-solid fa-right-to-bracket"></i> Se connecter
      </button>
    </form>

    <p class="auth-foot">Pas encore de compte ? <a href="register.html">Créer un compte</a></p>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
